name: "Build & Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v9.2.0)"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: "Run syntax check"
        run: |
          python -c "
          import ast, pathlib
          errors = []
          for f in pathlib.Path('.').rglob('*.py'):
              if 'dist' in str(f) or '__pycache__' in str(f):
                  continue
              try:
                  ast.parse(f.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('SYNTAX ERRORS:')
              for e in errors:
                  print(f'  {e}')
              raise SystemExit(1)
          print(f'Syntax OK')
          "

      - name: "Run tests"
        continue-on-error: true
        run: |
          pip install pytest
          python -m pytest tests/ -v --tb=short

      - name: "Read version"
        id: version
        shell: python
        run: |
          import os
          ns = {}
          exec(open('version.py', encoding='utf-8').read(), ns)
          ver = ns['VERSION']
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={ver}\n')
          print(f'Version: {ver}')

      - name: "Build EXE (PyInstaller)"
        run: pyinstaller ClientManager.spec --noconfirm --distpath output/dist --workpath output/build

      - name: "Smoke test EXE"
        shell: powershell
        run: |
          $exe = "output\dist\ClientManager\ClientManager.exe"
          if (Test-Path $exe) {
            $proc = Start-Process -FilePath $exe -PassThru
            Start-Sleep -Seconds 5
            if (!$proc.HasExited) {
              $proc.Kill()
              Write-Host "Smoke test PASSED (ran 5s)"
            } else {
              if ($proc.ExitCode -ne 0) {
                Write-Host "WARN: App exited with code $($proc.ExitCode)"
              } else {
                Write-Host "App exited cleanly"
              }
            }
          } else {
            Write-Host "EXE not found at $exe"
            exit 1
          }

      - name: "Package ZIP"
        shell: powershell
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $zipName = "ClientManager-v$ver-win64.zip"
          Compress-Archive -Path "output\dist\ClientManager\*" -DestinationPath $zipName
          Write-Host "Created: $zipName"
          Write-Host "Size: $((Get-Item $zipName).Length / 1MB) MB"

      - name: "Install Inno Setup"
        shell: powershell
        run: |
          choco install innosetup -y --no-progress
          Write-Host "Inno Setup installed"

      - name: "Build Installer"
        shell: powershell
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          # Update version in .iss
          (Get-Content installer.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$ver`"" | Set-Content installer.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          $setup = "output\installer\ClientManager-v$ver-setup.exe"
          if (Test-Path $setup) {
            Write-Host "Installer created: $setup ($([math]::Round((Get-Item $setup).Length / 1MB, 1)) MB)"
          } else {
            Write-Host "WARNING: Installer not found at $setup"
          }

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "ClientManager-v${{ steps.version.outputs.version }}"
          path: |
            ClientManager-v${{ steps.version.outputs.version }}-win64.zip
            output/installer/ClientManager-v${{ steps.version.outputs.version }}-setup.exe

      - name: "Extract changelog for version"
        id: changelog
        shell: python
        run: |
          import re
          text = open("CHANGELOG.md", encoding="utf-8").read()
          ver = "${{ steps.version.outputs.version }}"
          # Extract section between ## [ver] and next ## [
          pattern = rf"## \[{re.escape(ver)}\].*?\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          body = m.group(1).strip() if m else "See CHANGELOG.md for details."
          # Write to file (avoid multiline output issues)
          with open("release_body.md", "w", encoding="utf-8") as f:
              f.write(f"## ClientManager v{ver}\n\n")
              f.write(body + "\n\n---\n\n")
              f.write("### 📥 Как скачать и установить\n\n")
              f.write("| Файл | Описание |\n")
              f.write("|------|----------|\n")
              f.write(f"| `ClientManager-v{ver}-setup.exe` | **Установщик** — ярлык на рабочий стол, выбор папки |\n")
              f.write(f"| `ClientManager-v{ver}-win64.zip` | **Портативная** — распаковать и запустить |\n\n")
              f.write("#### Установка через установщик (рекомендуется)\n")
              f.write(f"1. Скачайте `ClientManager-v{ver}-setup.exe` ниже\n")
              f.write("2. Запустите скачанный файл\n")
              f.write("3. Выберите папку и нажмите «Установить»\n")
              f.write("4. Ярлык появится на рабочем столе — готово! 🎉\n\n")
              f.write("#### Портативная версия (ZIP)\n")
              f.write(f"1. Скачайте `ClientManager-v{ver}-win64.zip` ниже\n")
              f.write("2. Распакуйте в любую папку\n")
              f.write("3. Запустите `ClientManager.exe`\n\n")
              f.write("> 💡 Ваши данные (clients.db) сохраняются рядом с программой и не пропадут при обновлении.\n")
          print(f"Release body written ({len(body)} chars)")

      - name: "Create GitHub Release"
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_name }}"
          name: "ClientManager v${{ steps.version.outputs.version }}"
          body_path: "release_body.md"
          files: |
            ClientManager-v${{ steps.version.outputs.version }}-win64.zip
            output/installer/ClientManager-v${{ steps.version.outputs.version }}-setup.exe
          draft: false
          prerelease: false
